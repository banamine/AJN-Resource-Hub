name: ESLint Scanner

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  eslint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install dependencies
        # This replaces your old 'npm install -g' lines
        run: npm install 
          
      - name: Run ESLint
        # 'npm run lint' will use the local eslint and your package.json config
        # '|| true' ensures the workflow doesn't crash if it finds linting errors
        run: npm run lint || true
          
      - name: Upload analysis results to GitHub
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: eslint-results.sarif
