name: ESLint Scanner

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  eslint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install Dependencies
        run: |
          # Install locally to avoid global permission issues
          npm install --save-dev eslint eslint-plugin-html
          
      - name: Run ESLint on JavaScript files
        run: |
          # Use npx to ensure we use the local version of eslint
          if [ -d "js" ]; then
            npx eslint js/**/*.js --max-warnings=0
          else
            echo "No js directory found"
          fi
          
      - name: Extract and lint JavaScript from HTML
        run: |
          node -e '
          const fs = require("fs");
          const files = fs.readdirSync(".").filter(f => f.endsWith(".html"));
          let hasError = false;
          files.forEach(file => {
            const content = fs.readFileSync(file, "utf8");
            const scriptMatches = content.match(/<script>([\s\S]*?)<\/script>/gi);
            if (scriptMatches) {
              scriptMatches.forEach((script, idx) => {
                const jsCode = script.replace(/<\/?script>/gi, "");
                try {
                  new Function(jsCode);
                } catch(e) {
                  console.error(`❌ ${file} script block ${idx + 1}: ${e.message}`);
                  hasError = true;
                }
              });
            }
          });
          if (hasError) process.exit(1);
          console.log("✅ HTML script syntax validation passed");
          '
          
      - name: ESLint Result
        if: always()
        run: echo "ESLint scan completed"
