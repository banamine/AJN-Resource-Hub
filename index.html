<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AJN Archive Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-5">
    <h1 class="text-2xl font-bold">AJN Archive Player</h1>
    <div id="feed-status" class="mt-4 p-2 bg-slate-800 rounded">Initializing...</div>
    <div id="playlist-container" class="mt-4"></div>

    <script>
        // REPLACE THIS URL WITH YOUR ACTUAL WORKER URL
        const WORKER_URL = 'https://ajnresourcehub.banamine.workers.dev';
        
        async function init() {
            try {
                const response = await fetch(WORKER_URL);
                const html = await response.text();
                document.getElementById('feed-status').innerText = '✅ Archive Loaded';
                console.log('Archive data received successfully');
            } catch (e) {
                document.getElementById('feed-status').innerText = '⚠️ Error: ' + e.message;
            }
        }
        init();
    </script>
</body>
</html>
