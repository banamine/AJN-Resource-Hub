<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AJN Archive Player · Complete Archive</title>
    <meta name="description" content="AJN Complete Video Archive - All days supported">
    <meta name="theme-color" content="#0a0f1c">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0f1c; font-family: system-ui, -apple-system, sans-serif; }
        
        .player-container { background: #000; border-radius: 1.2rem; overflow: hidden; position: relative; }
        .segment-item { transition: all 0.2s ease; cursor: pointer; }
        .segment-item:hover { background: #1e293b; transform: translateX(4px); }
        .segment-active { background: #0f2b3d; border-left: 3px solid #3b82f6; }
        .playlist-scroll { max-height: 450px; overflow-y: auto; scrollbar-width: thin; }
        .playlist-scroll::-webkit-scrollbar { width: 5px; }
        .playlist-scroll::-webkit-scrollbar-track { background: #1e293b; }
        .playlist-scroll::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        
        .update-toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #1e293b; border: 1px solid #10b981; border-radius: 50px;
            padding: 12px 24px; display: flex; gap: 16px; align-items: center;
            z-index: 9999; backdrop-filter: blur(10px); animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        
        .flatpickr-calendar { background: #1e293b !important; border-color: #334155 !important; }
        .flatpickr-day { color: #cbd5e1 !important; }
        .flatpickr-day.selected { background: #3b82f6 !important; }
        .flatpickr-day.disabled { color: #475569 !important; }
        
        .music-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10, 15, 28, 0.95); backdrop-filter: blur(12px);
            display: flex; align-items: center; justify-content: center; flex-direction: column;
            z-index: 20; transition: opacity 0.6s ease;
        }
        .music-overlay-content {
            text-align: center; padding: 2rem; background: rgba(30, 41, 59, 0.85);
            border-radius: 2rem; border: 1px solid #3b82f6; max-width: 85%;
        }
        .vinyl-spinner {
            width: 80px; height: 80px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #1e293b, #0f172a);
            box-shadow: 0 0 0 4px #334155, 0 0 0 8px #1e293b;
            margin: 0 auto 20px auto; animation: spin 2s linear infinite; position: relative;
        }
        .vinyl-spinner::after {
            content: ""; position: absolute; top: 50%; left: 50%;
            width: 12px; height: 12px; background: #3b82f6; border-radius: 50%;
            transform: translate(-50%, -50%);
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .pulse-wave { display: flex; gap: 6px; justify-content: center; margin-top: 16px; }
        .pulse-wave span {
            width: 4px; height: 20px; background: #3b82f6; border-radius: 2px;
            animation: wave 0.8s ease-in-out infinite;
        }
        .pulse-wave span:nth-child(2) { animation-delay: 0.1s; height: 30px; }
        .pulse-wave span:nth-child(3) { animation-delay: 0.2s; height: 25px; }
        .pulse-wave span:nth-child(4) { animation-delay: 0.3s; height: 35px; }
        .pulse-wave span:nth-child(5) { animation-delay: 0.4s; height: 20px; }
        @keyframes wave { 0%, 100% { transform: scaleY(0.5); } 50% { transform: scaleY(1); } }
        
        .stop-music-btn, .init-audio-btn {
            border: none; border-radius: 40px; padding: 10px 24px;
            font-weight: bold; cursor: pointer; transition: all 0.2s; margin: 4px;
        }
        .stop-music-btn { background: #ef4444; color: white; }
        .stop-music-btn:hover { background: #dc2626; transform: scale(1.02); }
        .init-audio-btn { background: #10b981; color: white; }
        .init-audio-btn:hover { background: #059669; transform: scale(1.02); }
        .system-ready-btn { background: #22c55e; animation: pulse-green 1.2s infinite; }
        @keyframes pulse-green { 0%, 100% { box-shadow: 0 0 5px #22c55e; } 50% { box-shadow: 0 0 20px #22c55e; } }
        
        .hidden-overlay { opacity: 0; pointer-events: none; }
        .audio-pill {
            position: fixed; bottom: 16px; right: 16px; z-index: 10000;
            background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(8px);
            border-radius: 40px; padding: 6px 14px; display: flex;
            align-items: center; gap: 10px; border: 1px solid #3b82f6; font-size: 11px;
        }
        .audio-pill button { background: #ef4444; border: none; border-radius: 30px; padding: 3px 12px; color: white; cursor: pointer; }
        .fade-out { opacity: 0; pointer-events: none; transition: opacity 0.6s ease; }
        
        .special-badge { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; font-size: 9px; padding: 2px 6px; border-radius: 12px; margin-left: 6px; }
        .date-group { margin-bottom: 8px; }
        .date-header { background: #1e293b; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: bold; margin-top: 8px; cursor: pointer; }
        .date-header:hover { background: #334155; }
        
        .loading-spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #3b82f6; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .proxy-status { font-size: 9px; color: #64748b; margin-top: 8px; text-align: center; }
    </style>
</head>
<body>

    <div id="audioPill" class="audio-pill" style="display: none;">
        <span>🎵 Sirius</span>
        <button id="pillStopBtn">Stop</button>
    </div>

    <div id="update-toast" style="display: none;" class="update-toast">
        <span>🔄 New content available!</span>
        <button id="refresh-cache-btn" class="bg-blue-600 px-4 py-1 rounded-full text-sm">Refresh</button>
    </div>

    <div class="max-w-7xl mx-auto px-4 py-5">
        <div class="flex flex-col md:flex-row justify-between items-center gap-4 border-b border-slate-800 pb-5 mb-6">
            <div>
                <h1 class="text-3xl font-extrabold bg-gradient-to-r from-emerald-400 to-blue-500 bg-clip-text text-transparent">AJN Complete Archive</h1>
                <p class="text-sm text-slate-400">All shows · All days · Saturday Specials supported</p>
            </div>
            <div class="flex items-center gap-3">
                <button id="openCalendarBtn" class="bg-slate-800 border border-slate-700 rounded-full px-4 py-2 text-sm flex items-center gap-2 hover:bg-slate-700">
                    📅 <span id="selectedDateDisplay">Select date</span>
                </button>
                <div class="text-xs bg-slate-800 px-3 py-1.5 rounded-full flex items-center gap-2">
                    <span id="feed-status">Initializing...</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2">
                <div class="player-container bg-slate-900 border border-slate-700 rounded-2xl overflow-hidden relative">
                    <div class="bg-black aspect-video relative">
                        <video id="main-video" controls class="w-full h-full object-contain"></video>
                        
                        <div id="musicOverlay" class="music-overlay" style="display: none;">
                            <div class="music-overlay-content">
                                <div class="vinyl-spinner"></div>
                                <div class="pulse-wave"><span></span><span></span><span></span><span></span><span></span></div>
                                <div class="overlay-title" style="color:white; margin-top:16px;">🎵 The Alan Parsons Project · Sirius</div>
                                <div class="overlay-sub" id="overlayStatusMsg" style="color:#94a3b8; font-size:12px; margin:8px 0;">Loading archive...</div>
                                <button id="startAudioBtn" class="init-audio-btn hidden">🔊 Initialize Audio</button>
                                <button id="stopMusicAndPlayBtn" class="stop-music-btn">⏹ Stop Music & Play</button>
                                <div id="proxyStatusMsg" class="proxy-status"></div>
                            </div>
                        </div>
                    </div>
                    <div class="p-4 bg-slate-800/80 border-t border-slate-700">
                        <div class="flex justify-between items-center gap-3">
                            <div class="flex-1">
                                <h2 id="current-title" class="text-white font-bold text-lg truncate">Select a date</h2>
                                <span id="position-badge" class="text-[10px] bg-slate-700 px-2 py-0.5 rounded-full">0/0</span>
                            </div>
                            <div class="flex gap-2">
                                <button id="prev-segment-btn" class="bg-slate-700 hover:bg-slate-600 px-3 py-1.5 rounded-full text-sm">◀ Prev</button>
                                <button id="next-segment-btn" class="bg-blue-700 hover:bg-blue-600 px-3 py-1.5 rounded-full text-sm">Next ▶</button>
                            </div>
                        </div>
                        <div class="mt-3 w-full bg-slate-700 rounded-full h-1.5 overflow-hidden">
                            <div id="progress-bar" class="bg-blue-500 h-full w-0 transition-all"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-slate-900 rounded-2xl border border-slate-800 overflow-hidden flex flex-col h-[560px]">
                <div class="bg-slate-950 px-4 py-3 border-b border-slate-800 flex justify-between">
                    <h3 class="font-bold text-white text-sm">📋 Playlist</h3>
                    <span id="segment-count" class="text-[11px] text-slate-400">0 items</span>
                </div>
                <div id="playlist-container" class="playlist-scroll p-2 space-y-1 flex-1">
                    <div class="text-center text-slate-500 text-sm py-10">Loading archive...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== CONFIGURATION ==========
        const VERSION = '3.0.0';
        const CACHE_KEY = 'ajn_complete_archive_v3';
        const FEED_URL = 'https://rss.alexjones.media/AJNHourlyVideo.html';
        
        const PROXY_LIST = [
            'https://api.allorigins.win/raw?url=',
            'https://corsproxy.io/?',
            'https://thingproxy.freeboard.io/fetch/'
        ];
        
        // ========== GLOBAL STATE ==========
        let masterArchive = {};
        let availableDates = [];
        let currentSegments = [];
        let currentIndex = 0;
        let audioElement = null;
        let flatpickrInstance = null;
        let isLoadingArchive = false;
        
        // ========== DOM ELEMENTS ==========
        const videoPlayer = document.getElementById('main-video');
        const musicOverlay = document.getElementById('musicOverlay');
        const overlayStatusMsg = document.getElementById('overlayStatusMsg');
        const stopMusicBtn = document.getElementById('stopMusicAndPlayBtn');
        const startAudioBtn = document.getElementById('startAudioBtn');
        const audioPill = document.getElementById('audioPill');
        const pillStopBtn = document.getElementById('pillStopBtn');
        const feedStatusSpan = document.getElementById('feed-status');
        const playlistContainer = document.getElementById('playlist-container');
        const segmentCountSpan = document.getElementById('segment-count');
        const selectedDateDisplay = document.getElementById('selectedDateDisplay');
        const currentTitleSpan = document.getElementById('current-title');
        const positionBadge = document.getElementById('position-badge');
        const progressFill = document.getElementById('progress-bar');
        const proxyStatusSpan = document.getElementById('proxyStatusMsg');
        
        // ========== UTILITIES ==========
        function escapeHtml(str) { 
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); 
        }
        
        function announce(msg) { console.log('[PLAYER]', msg); }
        
        // ========== AUDIO SYSTEM ==========
        const SIRIUS_URLS = [
            'https://raw.githubusercontent.com/banamine/AJN-Resource-Hub/main/The%20Alan%20Parsons%20Project%20-%20Sirius%20(Official%20Audio).mp3',
            'https://archive.org/download/a-132-5_20260424/1.%20The%20Alan%20Parsons%20Project%20-%20Sirius%20%28Official%20Audio%29.mp4'
        ];
        
        function initAudio() {
            if (audioElement) return;
            audioElement = new Audio();
            audioElement.loop = true;
            audioElement.volume = 0.3;
            audioElement.src = SIRIUS_URLS[0];
            audioElement.load();
            
            audioElement.addEventListener('error', () => {
                if (audioElement.src === SIRIUS_URLS[0]) {
                    audioElement.src = SIRIUS_URLS[1];
                    audioElement.load();
                }
            });
        }
        
        async function startOverlayMusic() {
            if (!audioElement) initAudio();
            musicOverlay.style.display = 'flex';
            audioPill.style.display = 'flex';
            
            try {
                await audioElement.play();
                startAudioBtn.classList.add('hidden');
                overlayStatusMsg.textContent = '🎙️ Loading archive...';
            } catch(e) {
                overlayStatusMsg.textContent = '🔇 Click to enable audio';
                startAudioBtn.classList.remove('hidden');
            }
        }
        
        function stopMusic() {
            if (audioElement) {
                audioElement.pause();
                audioElement.currentTime = 0;
            }
            musicOverlay.classList.add('hidden-overlay');
            audioPill.classList.add('fade-out');
            setTimeout(() => {
                musicOverlay.style.display = 'none';
                audioPill.style.display = 'none';
                musicOverlay.classList.remove('hidden-overlay');
                audioPill.classList.remove('fade-out');
            }, 500);
        }
        
        startAudioBtn?.addEventListener('click', async () => {
            try {
                await audioElement.play();
                startAudioBtn.classList.add('hidden');
                overlayStatusMsg.textContent = '🎙️ Loading archive...';
            } catch(e) { console.error(e); }
        });
        
        stopMusicBtn?.addEventListener('click', () => {
            stopMusic();
            if (currentSegments.length) loadVideo(currentIndex);
        });
        
        pillStopBtn?.addEventListener('click', stopMusic);
        
        // ========== FEED PARSING ==========
        async function fetchFeed() {
            proxyStatusSpan.textContent = '🔄 Fetching archive...';
            
            // Try direct first
            try {
                const res = await fetch(FEED_URL, { cache: 'no-store' });
                if (res.ok) {
                    proxyStatusSpan.textContent = '✅ Connected';
                    return await res.text();
                }
            } catch(e) { console.log('Direct fail:', e); }
            
            // Try proxies
            for (let i = 0; i < PROXY_LIST.length; i++) {
                proxyStatusSpan.textContent = `🔄 Proxy ${i+1}/${PROXY_LIST.length}...`;
                try {
                    const res = await fetch(PROXY_LIST[i] + encodeURIComponent(FEED_URL));
                    if (res.ok) {
                        proxyStatusSpan.textContent = `✅ Proxy ${i+1}`;
                        return await res.text();
                    }
                } catch(e) {}
            }
            
            proxyStatusSpan.textContent = '❌ All connections failed';
            throw new Error('Cannot fetch feed');
        }
        
        function parseAllSegments(html) {
            const segments = [];
            const linkRegex = /<a\s+[^>]*href=["']([^"']*\.m4v)["'][^>]*>([^<]*(?:<[^>]+>[^<]*)*?)<\/a>/gi;
            let match;
            
            while ((match = linkRegex.exec(html)) !== null) {
                let url = match[1];
                let titleHtml = match[2];
                let titleText = titleHtml.replace(/<[^>]+>/g, '').trim();
                
                if (!url.includes('ajn.archives.pub')) continue;
                
                // Extract date from URL or title
                let dateStr = '';
                let urlDateMatch = url.match(/(\d{8})/);
                if (urlDateMatch) {
                    dateStr = urlDateMatch[1];
                } else {
                    let titleDateMatch = titleText.match(/(\d{4})-(\d{2})-(\d{2})/);
                    if (titleDateMatch) {
                        dateStr = titleDateMatch[1] + titleDateMatch[2] + titleDateMatch[3];
                    }
                }
                
                if (!dateStr || dateStr.length !== 8) continue;
                
                // Extract hour
                let hour = 0;
                let hourMatch = url.match(/Hr(\d)/i);
                if (hourMatch) {
                    hour = parseInt(hourMatch[1]);
                } else {
                    hourMatch = titleText.match(/Hr(\d)/i);
                    if (hourMatch) hour = parseInt(hourMatch[1]);
                }
                
                // Determine type
                const lowerTitle = titleText.toLowerCase();
                const isAlex = lowerTitle.includes('alex') && !lowerTitle.includes('warroom');
                const isWarRoom = lowerTitle.includes('warroom');
                const isSpecial = lowerTitle.includes('special') || lowerTitle.includes('sundaylive') || lowerTitle.includes('tnt');
                
                // Keep all valid segments (allow hour 0 for specials)
                if (hour < 0 || hour > 4) continue;
                if (!isAlex && !isWarRoom && !isSpecial) continue;
                
                segments.push({
                    url: url,
                    title: titleText,
                    dateStr: dateStr,
                    hour: hour,
                    isAlex: isAlex,
                    isWarRoom: isWarRoom,
                    isSpecial: isSpecial,
                    displayDate: `${dateStr.slice(0,4)}-${dateStr.slice(4,6)}-${dateStr.slice(6,8)}`
                });
            }
            
            console.log(`Parsed ${segments.length} total segments`);
            return segments;
        }
        
        function organizeArchive(segments) {
            const archive = {};
            
            // Group by date
            for (const seg of segments) {
                if (!archive[seg.dateStr]) archive[seg.dateStr] = [];
                archive[seg.dateStr].push(seg);
            }
            
            // Sort each date's segments
            for (const date in archive) {
                const specials = archive[date].filter(s => s.isSpecial);
                const alex = archive[date].filter(s => s.isAlex).sort((a,b) => a.hour - b.hour);
                const warroom = archive[date].filter(s => s.isWarRoom).sort((a,b) => a.hour - b.hour);
                
                // Order: Specials first, then Alex, then WarRoom
                archive[date] = [...specials, ...alex, ...warroom];
            }
            
            return archive;
        }
        
        // ========== PLAYLIST RENDERING ==========
        function renderPlaylist() {
            if (!playlistContainer) return;
            
            if (!currentSegments.length) {
                playlistContainer.innerHTML = '<div class="text-center text-slate-500 text-sm py-10">No segments for this date</div>';
                segmentCountSpan.textContent = '0 items';
                return;
            }
            
            const fragment = document.createDocumentFragment();
            
            for (let i = 0; i < currentSegments.length; i++) {
                const seg = currentSegments[i];
                const isActive = (i === currentIndex);
                
                let typeName = '';
                let typeColor = '';
                let hourDisplay = '';
                
                if (seg.isSpecial) {
                    typeName = '⭐ SPECIAL';
                    typeColor = 'text-amber-400';
                    hourDisplay = '<span class="special-badge">⭐</span>';
                } else if (seg.isAlex) {
                    typeName = 'Alex Jones';
                    typeColor = 'text-blue-400';
                    hourDisplay = `Hr${seg.hour}`;
                } else {
                    typeName = 'War Room';
                    typeColor = 'text-purple-400';
                    hourDisplay = `Hr${seg.hour}`;
                }
                
                const div = document.createElement('div');
                div.className = `segment-item p-3 rounded-xl border-l-4 ${isActive ? 'segment-active border-blue-500 bg-slate-800/60' : 'border-transparent bg-slate-800/30'}`;
                div.innerHTML = `
                    <div class="flex justify-between items-start gap-2">
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2 flex-wrap">
                                <span class="text-xs font-semibold ${typeColor}">${typeName}</span>
                                <span class="text-xs font-mono text-slate-300">${hourDisplay}</span>
                                <span class="text-[10px] bg-slate-700 px-1.5 py-0.5 rounded-full">${seg.displayDate}</span>
                            </div>
                            <p class="text-sm text-white truncate mt-1">${escapeHtml(seg.title.substring(0, 60))}</p>
                        </div>
                        ${isActive ? '<span class="text-green-400 text-xs">▶ PLAYING</span>' : '<span class="text-slate-500 text-xs">●</span>'}
                    </div>
                `;
                
                div.addEventListener('click', (function(idx) {
                    return function() { 
                        currentIndex = idx; 
                        loadVideo(currentIndex);
                        renderPlaylist();
                    };
                })(i));
                
                fragment.appendChild(div);
            }
            
            playlistContainer.replaceChildren(fragment);
            segmentCountSpan.textContent = `${currentSegments.length} videos`;
            
            // Scroll to active
            const activeEl = playlistContainer.querySelector('.segment-active');
            if (activeEl) activeEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        
        function loadVideo(index) {
            if (!currentSegments[index]) return;
            const seg = currentSegments[index];
            videoPlayer.src = seg.url;
            videoPlayer.load();
            videoPlayer.play().catch(e => console.log('Play error:', e));
            currentTitleSpan.textContent = seg.title;
            positionBadge.textContent = `${index + 1}/${currentSegments.length}`;
            announce(`Now playing: ${seg.title}`);
        }
        
        function nextVideo() {
            if (currentIndex + 1 < currentSegments.length) {
                currentIndex++;
                loadVideo(currentIndex);
                renderPlaylist();
            }
        }
        
        function prevVideo() {
            if (currentIndex - 1 >= 0) {
                currentIndex--;
                loadVideo(currentIndex);
                renderPlaylist();
            }
        }
        
        // ========== DATE SELECTION ==========
        function loadDate(dateStr) {
            if (!masterArchive[dateStr]) {
                console.warn(`No data for date: ${dateStr}`);
                return false;
            }
            
            currentSegments = masterArchive[dateStr];
            currentIndex = 0;
            renderPlaylist();
            
            if (currentSegments.length) {
                loadVideo(0);
            }
            
            return true;
        }
        
        // ========== MAIN INITIALIZATION ==========
        async function loadArchive() {
            if (isLoadingArchive) return;
            isLoadingArchive = true;
            feedStatusSpan.innerHTML = '<span class="loading-spinner"></span> Loading...';
            
            try {
                const html = await fetchFeed();
                const segments = parseAllSegments(html);
                
                if (segments.length === 0) {
                    throw new Error('No segments found in feed');
                }
                
                const archive = organizeArchive(segments);
                const dates = Object.keys(archive).sort().reverse();
                
                // Save to localStorage
                localStorage.setItem(CACHE_KEY, JSON.stringify({
                    archive: archive,
                    dates: dates,
                    version: VERSION,
                    timestamp: Date.now()
                }));
                
                masterArchive = archive;
                availableDates = dates;
                
                feedStatusSpan.innerHTML = `✅ ${dates.length} dates`;
                proxyStatusSpan.textContent = '';
                
                // Update calendar
                if (flatpickrInstance) {
                    const enabledDates = dates.map(d => new Date(parseInt(d.slice(0,4)), parseInt(d.slice(4,6))-1, parseInt(d.slice(6,8))));
                    flatpickrInstance.set('enable', enabledDates);
                }
                
                // Load most recent date
                if (dates.length && !currentSegments.length) {
                    const newest = dates[0];
                    selectedDateDisplay.textContent = `${newest.slice(0,4)}-${newest.slice(4,6)}-${newest.slice(6,8)}`;
                    loadDate(newest);
                }
                
                // Hide overlay if music is playing and we have content
                if (currentSegments.length && musicOverlay.style.display === 'flex') {
                    setTimeout(() => {
                        if (stopMusicBtn && !stopMusicBtn.classList.contains('system-ready-btn')) {
                            stopMusicBtn.textContent = '▶ READY - Play Video';
                            stopMusicBtn.classList.add('system-ready-btn');
                            overlayStatusMsg.textContent = 'Archive ready! Click to start.';
                        }
                    }, 500);
                }
                
            } catch (err) {
                console.error('Archive load failed:', err);
                feedStatusSpan.innerHTML = '⚠️ Connection error';
                proxyStatusSpan.textContent = 'Failed to load archive. Check connection.';
            } finally {
                isLoadingArchive = false;
            }
        }
        
        function loadCachedArchive() {
            const cached = localStorage.getItem(CACHE_KEY);
            if (!cached) return false;
            
            try {
                const data = JSON.parse(cached);
                if (data.archive && Object.keys(data.archive).length > 0) {
                    masterArchive = data.archive;
                    availableDates = data.dates || Object.keys(data.archive).sort().reverse();
                    feedStatusSpan.innerHTML = `📅 ${availableDates.length} dates (cached)`;
                    
                    if (availableDates.length) {
                        const newest = availableDates[0];
                        selectedDateDisplay.textContent = `${newest.slice(0,4)}-${newest.slice(4,6)}-${newest.slice(6,8)}`;
                        loadDate(newest);
                    }
                    
                    return true;
                }
            } catch(e) {}
            return false;
        }
        
        // ========== EVENT LISTENERS ==========
        videoPlayer.addEventListener('timeupdate', () => {
            if (videoPlayer.duration) {
                progressFill.style.width = `${(videoPlayer.currentTime / videoPlayer.duration) * 100}%`;
            }
        });
        
        videoPlayer.addEventListener('ended', () => nextVideo());
        videoPlayer.addEventListener('error', () => {
            console.log('Video error, skipping...');
            setTimeout(() => nextVideo(), 1000);
        });
        
        document.getElementById('prev-segment-btn')?.addEventListener('click', prevVideo);
        document.getElementById('next-segment-btn')?.addEventListener('click', nextVideo);
        document.getElementById('refresh-cache-btn')?.addEventListener('click', () => {
            localStorage.removeItem(CACHE_KEY);
            window.location.reload();
        });
        
        // ========== INIT ==========
        async function init() {
            initAudio();
            
            // Try cached first
            const hasCache = loadCachedArchive();
            
            if (!hasCache) {
                await startOverlayMusic();
                await loadArchive();
            } else {
                await startOverlayMusic();
                // Background refresh
                loadArchive().catch(console.error);
            }
            
            // Setup date picker
            flatpickrInstance = flatpickr("#openCalendarBtn", {
                dateFormat: "Y-m-d",
                onChange: (dates) => {
                    if (dates.length) {
                        const d = dates[0];
                        const ymd = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
                        if (masterArchive[ymd]) {
                            selectedDateDisplay.textContent = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                            loadDate(ymd);
                        } else {
                            selectedDateDisplay.textContent = 'No data for this date';
                        }
                    }
                }
            });
            
            // Enable dates if we have them
            if (availableDates.length) {
                const enabledDates = availableDates.map(d => new Date(parseInt(d.slice(0,4)), parseInt(d.slice(4,6))-1, parseInt(d.slice(6,8))));
                flatpickrInstance.set('enable', enabledDates);
            }
        }
        
        init();
    </script>
</body>
</html>
